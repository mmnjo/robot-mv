<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANDROID ONLINE</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:monospace;
}

canvas{
position:fixed;
inset:0;
}

#android{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
color:#7fffd4;
white-space:pre;
font-size:min(2vw,18px);
text-shadow:
0 0 10px #7fffd4,
0 0 20px #7fffd4;
z-index:10;
pointer-events:none;
}

.word{
position:absolute;
color:white;
font-size:14px;
pointer-events:none;
opacity:0.8;
white-space:nowrap;
}

#status{
position:absolute;
left:20px;
top:20px;
color:#7fffd4;
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="status">
ANDROID ONLINE<br>
SEARCHING FOR FRIEND...
</div>

<div id="android"></div>

<script>

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
s:Math.random()*2
});
}

function drawStars(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#7fffd4";

for(const star of stars){

ctx.fillRect(star.x,star.y,star.s,star.s);

star.y+=star.s*0.5;

if(star.y>innerHeight){
star.y=0;
star.x=Math.random()*innerWidth;
}

}
}

const android=document.getElementById("android");

const frame1=`
        _____
      /  ◉ ◉  \\
     |    ▽    |
      \\_______/

     
`;

const frame2=`
        _____
      /  - -  \\
     |    ▽    |
      \\_______/

 
`;

let blink=false;

setInterval(()=>{
blink=!blink;
android.textContent=blink ? frame1 : frame2;
},800);

const words=[
"HELLO",
"PLAY",
"FRIEND",
"ANDROID",
"ONLINE",
"(´･ω･`)",
"(・∀・)",
"★",
"LOVE",
"CONNECT"
];

function spawnWord(){

const el=document.createElement("div");
el.className="word";

el.textContent=
words[Math.floor(Math.random()*words.length)];

el.style.left=Math.random()*innerWidth+"px";
el.style.top=Math.random()*innerHeight+"px";

document.body.appendChild(el);

let life=0;

const timer=setInterval(()=>{

life++;

el.style.opacity=1-life/200;
el.style.transform=
`translateY(${-life}px)`;

if(life>200){
clearInterval(timer);
el.remove();
}

},16);

}

setInterval(spawnWord,300);

function loop(){

drawStars();

const y=
innerHeight/2+
Math.sin(Date.now()/700)*30;

android.style.top=y+"px";

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
