<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Android Chase MV Game</title>
<style>
body {
  margin: 0;
  background: #111;
  overflow: hidden;
}

canvas {
  display: block;
  margin: auto;
  background: #222;
  image-rendering: pixelated;
}
</style>
</head>

<body>

<canvas id="game" width="800" height="450"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
  x:150,
  y:350,
  size:35,
  speed:5
};

let android = {
  x:650,
  y:340,
  size:55,
  speed:1.2
};

let keys = {};

document.addEventListener("keydown", e=>{
  keys[e.key]=true;
});

document.addEventListener("keyup", e=>{
  keys[e.key]=false;
});


function drawPlayer(){
  ctx.fillStyle="#eee";

  // モナー風の丸い体
  ctx.beginPath();
  ctx.arc(
    player.x,
    player.y,
    player.size/2,
    0,
    Math.PI*2
  );
  ctx.fill();

  // 顔
  ctx.fillStyle="#222";
  ctx.beginPath();
  ctx.arc(player.x-8,player.y-5,4,0,Math.PI*2);
  ctx.arc(player.x+8,player.y-5,4,0,Math.PI*2);
  ctx.fill();
}


function drawAndroid(){

  // 四角いブラウン管
  ctx.fillStyle="#b6a48b";

  ctx.beginPath();
  ctx.roundRect(
    android.x,
    android.y,
    android.size,
    android.size,
    10
  );
  ctx.fill();


  // 画面
  ctx.fillStyle="#222";
  ctx.fillRect(
    android.x+10,
    android.y+10,
    android.size-20,
    android.size-20
  );


  // 目2つだけ
  ctx.fillStyle="white";

  ctx.beginPath();
  ctx.arc(
    android.x+22,
    android.y+27,
    5,
    0,
    Math.PI*2
  );

  ctx.arc(
    android.x+35,
    android.y+27,
    5,
    0,
    Math.PI*2
  );

  ctx.fill();
}


function update(){

  // プレイヤー移動
  if(keys["ArrowRight"])
    player.x+=player.speed;

  if(keys["ArrowLeft"])
    player.x-=player.speed;


  // アンドロイド追跡
  if(android.x > player.x)
    android.x-=android.speed;
  else
    android.x+=android.speed;


  // 画面外制限
  player.x=Math.max(20,Math.min(780,player.x));


  // 接触
  if(Math.abs(android.x-player.x)<40){
    alert("つかまった！");
    location.reload();
  }

}


function loop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );


  // 床
  ctx.fillStyle="#333";
  ctx.fillRect(0,390,800,60);


  update();
  drawPlayer();
  drawAndroid();


  requestAnimationFrame(loop);
}


loop();

</script>

</body>
</html>
