<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>robot_bbs</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:monospace;
    overflow:hidden;
}

#screen{
    white-space:pre;
    padding:20px;
    font-size:min(2vw,16px);
    line-height:1.2;
}

.glitch{
    animation:glitch 0.1s infinite;
}

@keyframes glitch{
    0%{transform:translate(0px);}
    50%{transform:translate(1px);}
    100%{transform:translate(-1px);}
}
</style>
</head>

<body>

<div id="screen"></div>

<script>

const screen=document.getElementById("screen");

const scenes=[

`Anonymous BBS v2.03

connecting...

`,

`[1] ロボットと遊びたい

(´･ω･`,

`[2]
無理だろ

`,

`[3]

      _____
    /       \\
   |  o   o  |
   |    ▽    |
    \\_______/

      ROBOT

`,

`[4]

HELLO

`,

`[5]

PLAY?

`,

`[6]

PLAY...

`,

`[7]

ERROR

ERROR

ERROR

`,

`[8]

( ; _ ; )

`,

`[9]

FRIEND?

`,

`[10]

      _____
    / ^   ^ \\
   |  •   •  |
   |    ▽    |
    \\_______/

HELLO FRIEND

`
];

let index=0;

function nextScene(){

screen.innerText=scenes[index];

if(index===7){
screen.classList.add("glitch");
}else{
screen.classList.remove("glitch");
}

index++;

if(index<scenes.length){
setTimeout(nextScene,3000);
}

}

nextScene();

</script>

</body>
</html>
