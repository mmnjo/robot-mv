<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ANDROID CHASE</title>

<style>
html,body{
margin:0;
overflow:hidden;
background:#050505;
font-family:monospace;
height:100%;
}

canvas{
position:fixed;
inset:0;
}

#android,#mona{
position:absolute;
white-space:pre;
z-index:10;
}

#android{
color:#7fffd4;
font-size:18px;
text-shadow:0 0 10px #7fffd4;
}

#mona{
color:white;
font-size:24px;
}

.word{
position:absolute;
color:#7fffd4;
opacity:.6;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="mona">(･∀･)</div>

<div id="android"></div>

<script>

const android=document.getElementById("android");
const mona=document.getElementById("mona");

const screens=[
"HELLO",
"PLAY?",
"ONLINE",
"FRIEND?",
"ERROR",
"CONNECT"
];

let screenIndex=0;

setInterval(()=>{
screenIndex=(screenIndex+1)%screens.length;

android.textContent=
`╔════════╗
║ ${screens[screenIndex].padEnd(7," ")}║
║ ◉    ◉ ║
╚════════╝
    ║║
 ╔══╩══╗
 ║     ║
 ╚═════╝`;
},1200);

let monaX=50;
let dir=1;

function animate(){

monaX+=dir*2;

if(monaX>window.innerWidth*0.7){
dir=-1;
}

if(monaX<50){
dir=1;
}

const androidX=monaX+220;

mona.style.left=monaX+"px";
mona.style.top=
(window.innerHeight*0.65+
Math.sin(Date.now()/300)*10)+"px";

android.style.left=androidX+"px";
android.style.top=
(window.innerHeight*0.45+
Math.sin(Date.now()/500)*20)+"px";

requestAnimationFrame(animate);
}

animate();

const words=[
"HELLO",
"PLAY",
"FRIEND",
"ONLINE",
"(´･ω･`)",
"(・∀・)",
"CONNECT"
];

function spawnWord(){

const el=document.createElement("div");

el.className="word";

el.textContent=
words[Math.floor(Math.random()*words.length)];

el.style.left=
Math.random()*window.innerWidth+"px";

el.style.top=
Math.random()*window.innerHeight+"px";

document.body.appendChild(el);

let life=0;

const timer=setInterval(()=>{

life++;

el.style.transform=
`translateY(${-life}px)`;

el.style.opacity=
1-life/150;

if(life>150){

clearInterval(timer);
el.remove();

}

},16);

}

setInterval(spawnWord,250);

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}

resize();

window.addEventListener("resize",resize);

const stars=[];

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
s:Math.random()*2+1
});

}

function drawBg(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#7fffd4";

for(const star of stars){

ctx.fillRect(star.x,star.y,star.s,star.s);

star.y+=star.s*0.5;

if(star.y>innerHeight){

star.y=0;
star.x=Math.random()*innerWidth;

}

}

requestAnimationFrame(drawBg);

}

drawBg();

</script>

</body>
</html>
