<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Android Chase MV</title>

<style>
body {
  margin:0;
  background:#111;
  overflow:hidden;
}

canvas {
  display:block;
  margin:auto;
  background:#222;
  image-rendering:pixelated;
}
</style>

</head>

<body>

<canvas id="game" width="800" height="450"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


let player = {
  x:120,
  y:330,
  speed:5,
  stamina:100,
  tired:false
};


let android = {
  x:600,
  y:320,
  speed:1.5
};


let keys={};


document.addEventListener("keydown", e=>{
  keys[e.key]=true;
});


document.addEventListener("keyup", e=>{
  keys[e.key]=false;
});



// 主人公
function drawPlayer(){

  // 疲れると少し下がる
  let offset = player.tired ? 5 : 0;


  ctx.fillStyle="#eeeeee";

  ctx.beginPath();
  ctx.arc(
    player.x,
    player.y+offset,
    25,
    0,
    Math.PI*2
  );
  ctx.fill();


  // 目
  ctx.fillStyle="#222";

  ctx.beginPath();

  ctx.arc(
    player.x-9,
    player.y-5+offset,
    4,
    0,
    Math.PI*2
  );

  ctx.arc(
    player.x+9,
    player.y-5+offset,
    4,
    0,
    Math.PI*2
  );

  ctx.fill();


  // 疲労表現
  if(player.tired){

    ctx.fillStyle="white";
    ctx.font="18px sans-serif";
    ctx.fillText(
      "ハァ…",
      player.x-20,
      player.y-45
    );


    // 汗
    ctx.fillStyle="#6cf";

    ctx.beginPath();
    ctx.arc(
      player.x+25,
      player.y-15,
      5,
      0,
      Math.PI*2
    );
    ctx.fill();

  }

}



// アンドロイド
function drawAndroid(){

  // 本体
  ctx.fillStyle="#b59f82";

  ctx.beginPath();

  ctx.roundRect(
    android.x,
    android.y,
    55,
    55,
    12
  );

  ctx.fill();


  // ブラウン管画面
  ctx.fillStyle="#222";

  ctx.fillRect(
    android.x+10,
    android.y+10,
    35,
    35
  );


  // 目2つだけ
  ctx.fillStyle="white";

  ctx.beginPath();

  ctx.arc(
    android.x+22,
    android.y+27,
    5,
    0,
    Math.PI*2
  );

  ctx.arc(
    android.x+35,
    android.y+27,
    5,
    0,
    Math.PI*2
  );

  ctx.fill();

}



// 更新
function update(){


  // 主人公が追う
  if(keys["ArrowRight"]){

    player.x += player.speed;

    player.stamina -= 0.15;

  }


  // 疲労
  if(player.stamina < 50){

    player.tired=true;
    player.speed=3;

  }


  if(player.stamina < 20){

    player.speed=1.8;

  }



  // アンドロイドは逃げる
  android.x += android.speed;



  // 画面外へ行ったらループ
  if(android.x > 850){

    android.x=-100;

  }



  // 追いついた
  if(player.x > android.x-30){

    alert("アンドロイドに追いついた！");
    location.reload();

  }



}




function loop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );


  // 地面
  ctx.fillStyle="#333";
  ctx.fillRect(
    0,
    380,
    800,
    70
  );


  update();

  drawPlayer();

  drawAndroid();


  requestAnimationFrame(loop);

}


loop();


</script>

</body>
</html>
